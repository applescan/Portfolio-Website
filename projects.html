    <script>
        const data = [
            { title: 'Mixtape-me | Spotify app integration.', desc: 'Full Stack Web Developer | 2022 | Spotify Web API', url: 'images/project/mix1.webp', ref: 'mixtape-me.html' },
            { title: `Airscammer - Let's Learn About Airline Scams!`, desc: 'Full Stack Web Developer | 2022 | Future Skills Academy', url: 'images/project/airscammer.webp', ref: 'airscammer.html' },
            { title: 'Deltapath Mobile UI & UX Design', desc: 'UI & UX Design | 2022 | Deltapath', url: 'images/project/dpm.webp', ref: 'deltapathMobile.html' },
            { title: 'Deltapath Salesforce CTI Integration', desc: 'UI & UX Design | 2022 | Deltapath', url: 'images/project/cti.webp', ref: 'salesforce.html' },
            { title: 'Deltapath Talk (Microsoft Teams Integration)', desc: 'UI Design | 2022 | Deltapath', url: 'images/project/dpm-talk.webp', ref: 'talk.html' },
            { title: `Let's Talk Therapy`, desc: `Web Design & Development, Logo & Branding | 2022 | Let's Talk Therapy`, url: 'images/project/therapy.webp', ref: 'therapy.html' },
            { title: 'Corporate Website: Redesigning a Decade-Old Website', desc: 'Web Design & Development | 2022 | Deltapath', url: 'images/project/website.webp', ref: 'deltapathWebsite.html' },
            { title: 'Mana - Power of Aotearoa', desc: 'Identity & Branding, Print | 2019', url: 'images/project/mana.webp', ref: 'mana.html' },
        ]

        //using for loop
        for (let i = 0; i < data.length; i++) { addCard2(data[i].title, data[i].desc, data[i].url, data[i].ref) } //using map const


        function addCard2(name, age, url, ref) {
            const template = document.getElementById("card-template").content.cloneNode(true);
            template.querySelector('.card-title').innerText = name;
            template.querySelector('.card-text').innerText = age;
            template.querySelector('.card-img-top').src = url;
            template.querySelector('#page').href = ref;
            document.querySelector('#main-row').appendChild(template);
        }

    </script>
